<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhay Pandey | Portfolio</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
line-height:1.6;
background:#f4f6f9;
color:#333;
}

header{
background:#111827;
color:white;
padding:20px 10%;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

header h1{
font-size:24px;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-weight:500;
}

nav a:hover{
text-decoration:underline;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:40px 0;
}

section{
margin-bottom:60px;
}

h2{
margin-bottom:20px;
color:#111827;
border-left:5px solid #3b82f6;
padding-left:10px;
}

.about{
display:flex;
flex-wrap:wrap;
align-items:center;
gap:30px;
}

.profile-photo{
width:180px;
height:180px;
background:#ddd;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
color:#555;
}

.about-text{
flex:1;
min-width:250px;
}

.skills-list{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.skill{
background:#3b82f6;
color:white;
padding:8px 14px;
border-radius:20px;
font-size:14px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
margin-bottom:15px;
}

.projects-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.project-card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.project-image{
height:150px;
background:#ddd;
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
font-size:13px;
color:#555;
